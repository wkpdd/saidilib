<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hors ligne — Saidi Papetrie</title>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#fff8ec;color:#1a1a2e;
             min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center}
        .box{max-width:360px}
        img{width:150px;height:auto;margin:0 auto 20px;display:block}
        h1{font-size:22px;font-weight:800;margin-bottom:8px}
        p{color:#64748b;font-size:15px;line-height:1.5;margin-bottom:22px}
        .icon{font-size:52px;margin-bottom:8px}
        button{background:#e07d00;color:#fff;border:0;border-radius:14px;padding:13px 26px;font-size:15px;
               font-weight:700;cursor:pointer}
        button:active{filter:brightness(.95)}
    </style>
</head>
<body>
    <div class="box">
        <img src="/logov2.jpeg" alt="Saidi Papetrie" onerror="this.style.display='none'">
        <div class="icon">📡</div>
        <h1>Vous êtes hors ligne</h1>
        <p>Impossible de charger la page. Vérifiez votre connexion Wi-Fi ou données mobiles, puis réessayez. Les pages déjà visitées restent disponibles.</p>
        <button onclick="location.reload()">Réessayer</button>
    </div>
</body>
</html>
