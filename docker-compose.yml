services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: saidi_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-custom.ini
    ports:
      - "8088:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - saidi

  db:
    image: mysql:8.0
    container_name: saidi_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: saidi
      MYSQL_USER: saidi
      MYSQL_PASSWORD: saidi
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "33060:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - saidi

  node:
    image: node:20-alpine
    container_name: saidi_node
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    profiles: ["tools"]
    networks:
      - saidi

  phpmyadmin:
    image: phpmyadmin:5
    container_name: saidi_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8089:80"
    depends_on:
      - db
    networks:
      - saidi

volumes:
  dbdata:

networks:
  saidi:
    driver: bridge
